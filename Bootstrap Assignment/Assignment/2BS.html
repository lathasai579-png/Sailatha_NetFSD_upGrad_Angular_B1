<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Electronics Store</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <style>
    .card-img-top {
      height: 200px;      
      width: 100%;

        </div>
